[package]
name = "petools"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
regex = "1.7.0"
binrw = "0.10.0"
serde = { version = "1.0.151", features = ["derive"] }
serde_json = "1.0.91"
structopt = "0.3.26"
ddsfile = "0.5.1"
texpresso = "2.0.1"
bitflags = "1.3.2"
flate2 = "1.0.25"
array_tool = "1.0.3"
num = "0.4.0"
num-derive = "0.3"
num-traits = "0.2"
zip = { version = "0.6.3", features = ["deflate"], default-features = false }
paste = "1.0.11"
